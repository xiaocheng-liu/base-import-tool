name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release?'
        type: boolean
        default: false

jobs:
  # ==================== Windows ====================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci

      - name: Download Oracle Instant Client (Windows)
        uses: iamazeem/setup-oracle-instant-client-action@v2
        id: oracle-windows

      - name: Copy Oracle Client to resources
        shell: pwsh
        run: |
          $clientDir = "src-tauri\resources\oracle-client-windows"
          New-Item -ItemType Directory -Force -Path $clientDir | Out-Null
          Copy-Item -Path "${{ steps.oracle-windows.outputs.install-path }}\*" -Destination $clientDir -Recurse -Force
          Write-Host "✓ Oracle Instant Client copied to $clientDir"
          if (Test-Path "$clientDir\oci.dll") {
            Write-Host "  oci.dll found"
          }

      - run: npm run build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          args: --target x86_64-pc-windows-msvc

      - uses: actions/upload-artifact@v4
        id: upload-msi
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

  # ==================== macOS x86_64 ====================
  build-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (macOS)
        run: brew install unixodbc

      - run: npm ci

      - name: Download Oracle Instant Client (macOS x64)
        uses: iamazeem/setup-oracle-instant-client-action@v2
        id: oracle-macos-x64

      - name: Copy Oracle Client to resources
        run: |
          mkdir -p src-tauri/resources/oracle-client-macos
          cp -R "${{ steps.oracle-macos-x64.outputs.install-path }}/"* src-tauri/resources/oracle-client-macos/
          echo "✓ Oracle Instant Client copied"
          ls src-tauri/resources/oracle-client-macos/ | head -10

      - run: npm run build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          args: --target x86_64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

  # ==================== macOS ARM64 (Apple Silicon) ====================
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install system dependencies (macOS)
        run: brew install unixodbc

      - run: npm ci

      - name: Download Oracle Instant Client (macOS ARM64)
        uses: iamazeem/setup-oracle-instant-client-action@v2
        id: oracle-macos-arm64

      - name: Copy Oracle Client to resources
        run: |
          mkdir -p src-tauri/resources/oracle-client-macos
          cp -R "${{ steps.oracle-macos-arm64.outputs.install-path }}/"* src-tauri/resources/oracle-client-macos/
          echo "✓ Oracle Instant Client copied"
          ls src-tauri/resources/oracle-client-macos/ | head -10

      - run: npm run build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          args: --target aarch64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

  # ==================== Create GitHub Release ====================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos-x64, build-macos-arm64]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Generate changelog
        id: changelog
        run: |
          echo "## Release ${{ github.ref_name }}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Assets" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          find artifacts -type f | while read f; do
            echo "- $(basename "$f")" >> CHANGELOG.md
          done
          cat CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: |
            artifacts/**/*
