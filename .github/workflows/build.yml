name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release?'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ==================== Windows ====================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci

      - name: Sync version from Git tag
        shell: pwsh
        run: |
          # 从 git tag 提取版本号（去掉 v 前缀），例如 v0.1.2 -> 0.1.2
          $ver = '${{ github.ref_name }}' -replace '^v', ''

          # 更新 tauri.conf.json
          $tauriConf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauriConf.version = $ver
          $tauriConf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json -Encoding UTF8
          Write-Host "tauri.conf.json version -> $ver"

          # 更新 Cargo.toml
          $cargo = Get-Content src-tauri/Cargo.toml -Raw
          $cargo = $cargo -replace '^version\s*=\s*"[^"]*"', ('version = "' + $ver + '"')
          Set-Content src-tauri/Cargo.toml -Value $cargo -Encoding UTF8
          Write-Host "Cargo.toml version -> $ver"

      - name: Download Oracle Instant Client (Windows)
        uses: iamazeem/setup-oracle-instant-client-action@v2
        id: oracle-windows

      - name: Copy Oracle Client to resources
        shell: pwsh
        run: |
          $clientDir = "src-tauri\resources\oracle-client-windows"
          New-Item -ItemType Directory -Force -Path $clientDir | Out-Null
          Copy-Item -Path "${{ steps.oracle-windows.outputs.install-path }}\*" -Destination $clientDir -Recurse -Force
          Write-Host "✓ Oracle Instant Client copied to $clientDir"
          if (Test-Path "$clientDir\oci.dll") {
            Write-Host "  oci.dll found"
          }

      - run: npm run build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}

  # ==================== macOS x86_64 ====================
  build-macos-x64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (macOS)
        run: brew install unixodbc

      - run: npm ci

      - name: Sync version from Git tag
        run: |
          ver='${{ github.ref_name }}'
          ver="${ver#v}"

          # 更新 tauri.conf.json（macOS 自带 jq 或 perl）
          perl -i -pe 's/"version"\s*:\s*"[^"]*"/"version": "'"$ver"'"/' src-tauri/tauri.conf.json
          echo "tauri.conf.json version -> $ver"

          # 更新 Cargo.toml
          perl -i -pe 's/^version\s*=\s*"[^"]*"/version = "'"$ver"'"/' src-tauri/Cargo.toml
          echo "Cargo.toml version -> $ver"

      - name: Download Oracle Instant Client (macOS x64)
        uses: iamazeem/setup-oracle-instant-client-action@v2
        id: oracle-macos-x64

      - name: Copy Oracle Client to resources
        run: |
          mkdir -p src-tauri/resources/oracle-client-macos
          cp -R "${{ steps.oracle-macos-x64.outputs.install-path }}/"* src-tauri/resources/oracle-client-macos/
          echo "✓ Oracle Instant Client copied"
          ls src-tauri/resources/oracle-client-macos/ | head -10

      - run: npm run build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}

  # ==================== macOS ARM64 (Apple Silicon) ====================
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install system dependencies (macOS)
        run: brew install unixodbc

      - run: npm ci

      - name: Sync version from Git tag
        run: |
          ver='${{ github.ref_name }}'
          ver="${ver#v}"

          # 更新 tauri.conf.json
          perl -i -pe 's/"version"\s*:\s*"[^"]*"/"version": "'"$ver"'"/' src-tauri/tauri.conf.json
          echo "tauri.conf.json version -> $ver"

          # 更新 Cargo.toml
          perl -i -pe 's/^version\s*=\s*"[^"]*"/version = "'"$ver"'"/' src-tauri/Cargo.toml
          echo "Cargo.toml version -> $ver"

      - name: Download Oracle Instant Client (macOS ARM64)
        uses: iamazeem/setup-oracle-instant-client-action@v2
        id: oracle-macos-arm64

      - name: Copy Oracle Client to resources
        run: |
          mkdir -p src-tauri/resources/oracle-client-macos
          cp -R "${{ steps.oracle-macos-arm64.outputs.install-path }}/"* src-tauri/resources/oracle-client-macos/
          echo "✓ Oracle Instant Client copied"
          ls src-tauri/resources/oracle-client-macos/ | head -10

      - run: npm run build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target aarch64-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
