name: Build Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ==================== Windows ====================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci

      - name: Download Oracle Instant Client (Windows)
        uses: iamazeem/setup-oracle-instant-client-action@v2
        id: oracle-windows

      - name: Copy Oracle Client to resources
        shell: pwsh
        run: |
          $clientDir = "src-tauri\resources\oracle-client-windows"
          New-Item -ItemType Directory -Force -Path $clientDir | Out-Null
          Copy-Item -Path "${{ steps.oracle-windows.outputs.install-path }}\*" -Destination $clientDir -Recurse -Force
          Write-Host "✓ Oracle Instant Client copied to $clientDir"
          if (Test-Path "$clientDir\oci.dll") {
            Write-Host "  oci.dll found"
          }

      - run: npm run build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

  # ==================== macOS x86_64 ====================
  build-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci

      - name: Download Oracle Instant Client (macOS x64)
        uses: iamazeem/setup-oracle-instant-client-action@v2
        id: oracle-macos-x64

      - name: Copy Oracle Client to resources
        run: |
          mkdir -p src-tauri/resources/oracle-client-macos
          cp -R "${{ steps.oracle-macos-x64.outputs.install-path }}/"* src-tauri/resources/oracle-client-macos/
          echo "✓ Oracle Instant Client copied"
          ls src-tauri/resources/oracle-client-macos/ | head -10

      - run: npm run build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

  # ==================== macOS ARM64 (Apple Silicon) ====================
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: npm ci

      - name: Download Oracle Instant Client (macOS ARM64)
        uses: iamazeem/setup-oracle-instant-client-action@v2
        id: oracle-macos-arm64

      - name: Copy Oracle Client to resources
        run: |
          mkdir -p src-tauri/resources/oracle-client-macos
          cp -R "${{ steps.oracle-macos-arm64.outputs.install-path }}/"* src-tauri/resources/oracle-client-macos/
          echo "✓ Oracle Instant Client copied"
          ls src-tauri/resources/oracle-client-macos/ | head -10

      - run: npm run build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target aarch64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
